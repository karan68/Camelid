name: release

# Build a prebuilt `camelid` binary (with the web UI embedded) for each
# supported platform and attach it to the GitHub release, so most users never
# have to build from source. Triggered by pushing a version tag, or manually.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            label: macos-arm64
          - os: ubuntu-latest
            label: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The web UI is embedded into the binary at compile time, so it must be
      # built before cargo build.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build web UI
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.87.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin camelid

      - name: Package
        run: |
          set -euo pipefail
          dist="camelid-${{ matrix.label }}"
          mkdir -p "$dist"
          strip target/release/camelid || true
          cp target/release/camelid "$dist/"
          cp README.md LICENSE THIRD_PARTY_NOTICES.md "$dist/"
          tar -czf "$dist.tar.gz" "$dist"
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: camelid-${{ matrix.label }}
          path: |
            camelid-${{ matrix.label }}.tar.gz
            camelid-${{ matrix.label }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
