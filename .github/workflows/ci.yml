name: ci

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  public-scrub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for private operator details
        run: bash scripts/check-public-scrub.sh

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Audit public evidence bundles for private details
        run: node scripts/audit-evidence-bundle-privacy.mjs --strict

      - name: Verify public evidence bundle checksums
        run: bash scripts/check-evidence-bundle-checksums.sh

      - name: Check public evidence claims
        run: node scripts/check-public-evidence-claims.mjs

      - name: Check CUDA batched-prefill parity gate wiring
        run: node scripts/check-cuda-prefill-parity-gate.mjs

      - name: Check README screenshot contract
        run: node scripts/test-readme-screenshot.mjs

      - name: Check README status contract
        run: |
          set -euo pipefail
          ! grep -n -E '^(## Current Status|As of 2026-05-22, Camelid is useful but deliberately narrow:|- \\*\\*(Working product surface|Supported exact rows|Next row|Blocked row|Performance posture):\\*\\*)' README.md

  rust:
    needs: public-scrub
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is Apple Silicon, so it compiles and lints the
        # cfg(target_os = "macos") Metal path that ubuntu never sees. The Metal
        # tests self-skip when no GPU device is reported by the runner.
        # windows-latest (MSVC) is a first-class CPU target: it builds the
        # Windows file-I/O / mmap path (src/platform_fs.rs, the memmap2 wire
        # mapping) and runs the same exact-row gates as the other hosts.
        #
        # `features` is per-OS. CUDA is the DEFAULT build on Windows only (build.rs
        # injects the `cuda` cfg and cudarc is a non-optional Windows dep), so the
        # plain default build on windows-latest already exercises the GPU backend.
        # On Linux CUDA is opt-in, so ubuntu-latest uses --all-features to also build
        # and lint it (cudarc dynamic-loads — no CUDA SDK needed, and the GPU tests
        # self-skip without a device). macOS has no cudarc (its GPU lane is Metal), so
        # it uses the default feature set. GPU parity is validated on a CUDA host.
        include:
          - os: ubuntu-latest
            features: --all-features
          - os: macos-latest
            features: ''
          - os: windows-latest
            features: ''
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets ${{ matrix.features }} -- -D warnings

      - name: Tests
        run: cargo test --all-targets ${{ matrix.features }}

      - name: Docs
        run: cargo doc --no-deps ${{ matrix.features }}

  # Windows-only build / lint / test of the additive camelid-desktop crate. The `rust`
  # job above scopes clippy/test/doc to default-members (the server), so without this the
  # desktop crate would only be fmt-checked. Tauri/WebView2 is Windows-only and the crate
  # is Windows-only, so this lives on its own leg rather than in the cross-OS `rust` matrix.
  # It needs no frontend build: the desktop app bundles only its static splash; the embedded
  # web UI lives in camelid.exe, which this job does not build. The base tauri.conf.json
  # declares no sidecar resources (those are in the bundle-only overlay), so the crate builds
  # on a fresh checkout with no sidecar staged.
  desktop:
    needs: public-scrub
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy (camelid-desktop)
        run: cargo clippy -p camelid-desktop --all-targets -- -D warnings

      - name: Tests (camelid-desktop)
        run: cargo test -p camelid-desktop --all-targets

  validation-scripts:
    runs-on: ubuntu-latest
    needs: public-scrub
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Validation harness self-tests
        run: |
          set -euo pipefail
          for test_script in scripts/test-*.mjs; do
            echo "== ${test_script}"
            node "${test_script}"
          done

  frontend:
    runs-on: ubuntu-latest
    needs: public-scrub
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Frontend support-contract smoke
        run: npm run smoke:model-state

      - name: Frontend 3B exact-row closure smoke
        run: npm run smoke:3b-closure

      - name: Frontend integration smoke
        run: npm run smoke:integration
